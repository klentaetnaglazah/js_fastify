<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fastify API</title>
    <style>
        body {
            font-family: Verdana, sans-serif;
            max-width: 1000px;
            margin: 100px auto;
            padding: 25px;
            text-align: center;
        }
        button {
            padding: 20px 40px;
            font-size: 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        #status {
            margin-top: 20px;
            padding: 10px;
            border-radius: 5px;
            display: none;
        }
    </style>
</head>
<body>
    <h1>Fastify API</h1>
    <button id="apiButton">Запрос на АПИ</button>
    <div id="status"></div>

    <script>
        document.getElementById('apiButton').addEventListener('click', async () => {
            const statusDiv = document.getElementById('status');
            
            try {
                const response = await fetch('/api');
                const data = await response.text();
                
                if (response.ok && data === 'Успешно') {
                    console.log('Успешно');
                    statusDiv.textContent = data;
                    statusDiv.className = 'success';
                    statusDiv.style.display = 'block';
                } else {
                    throw new Error('Неожиданный ответ от сервера');
                }
            } catch (error) {
                console.error('Ошибка:', error.message);
                statusDiv.textContent = 'Ошибка';
                statusDiv.className = 'error';
                statusDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
